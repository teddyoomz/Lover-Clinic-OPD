  <text x="141" y="410" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">46</text>
  <text x="160" y="413" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">45</text>
  <text x="176" y="415" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">44</text>
  <text x="191" y="418" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">43</text>
  <text x="205" y="418" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">33</text>
  <text x="220" y="415" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">34</text>
  <text x="236" y="413" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">35</text>
  <text x="254" y="410" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">36</text>
