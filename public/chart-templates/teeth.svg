<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 400 500" fill="none" stroke="#888" stroke-width="1.2">
  <!-- Upper jaw label -->
  <text x="200" y="25" text-anchor="middle" fill="#888" font-size="14" font-family="sans-serif" stroke="none">Upper</text>
  <!-- Upper jaw outline -->
  <path d="M80 120 Q80 40 200 35 Q320 40 320 120" stroke-width="1.5" />
  <!-- Upper teeth (16 teeth) -->
  <!-- Right side (patient's right = our left) -->
  <rect x="85" y="60" width="22" height="28" rx="4" />
  <rect x="110" y="50" width="20" height="32" rx="4" />
  <rect x="133" y="45" width="18" height="34" rx="3" />
  <rect x="153" y="42" width="16" height="35" rx="3" />
  <rect x="171" y="40" width="14" height="36" rx="2" />
  <rect x="187" y="38" width="12" height="38" rx="2" />
  <!-- Left side -->
  <rect x="201" y="38" width="12" height="38" rx="2" />
  <rect x="215" y="40" width="14" height="36" rx="2" />
  <rect x="231" y="42" width="16" height="35" rx="3" />
  <rect x="249" y="45" width="18" height="34" rx="3" />
  <rect x="270" y="50" width="20" height="32" rx="4" />
  <rect x="293" y="60" width="22" height="28" rx="4" />
