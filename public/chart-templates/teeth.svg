  <line x1="60" y1="250" x2="340" y2="250" stroke="#ccc" stroke-dasharray="4 4" />
  <text x="40" y="255" fill="#aaa" font-size="10" font-family="sans-serif" stroke="none">R</text>
  <text x="355" y="255" fill="#aaa" font-size="10" font-family="sans-serif" stroke="none">L</text>
  <!-- Lower jaw label -->
  <text x="200" y="490" text-anchor="middle" fill="#888" font-size="14" font-family="sans-serif" stroke="none">Lower</text>
  <!-- Lower jaw outline -->
  <path d="M80 380 Q80 460 200 465 Q320 460 320 380" stroke-width="1.5" />
  <!-- Lower teeth (16 teeth) -->
  <rect x="88" y="405" width="20" height="26" rx="4" />
  <rect x="111" y="410" width="19" height="28" rx="4" />
  <rect x="133" y="415" width="17" height="30" rx="3" />
  <rect x="152" y="418" width="15" height="30" rx="3" />
  <rect x="169" y="420" width="14" height="32" rx="2" />
  <rect x="185" y="422" width="12" height="32" rx="2" />
  <rect x="199" y="422" width="12" height="32" rx="2" />
  <rect x="213" y="420" width="14" height="32" rx="2" />
  <rect x="229" y="418" width="15" height="30" rx="3" />
  <rect x="246" y="415" width="17" height="30" rx="3" />
  <rect x="266" y="410" width="19" height="28" rx="4" />
  <rect x="288" y="405" width="20" height="26" rx="4" />
