  <text x="120" y="100" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">17</text>
  <text x="142" y="97" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">16</text>
  <text x="161" y="95" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">15</text>
  <text x="178" y="93" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">14</text>
  <text x="193" y="92" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">13</text>
  <text x="207" y="92" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">23</text>
  <text x="222" y="93" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">24</text>
  <text x="239" y="95" text-anchor="middle" fill="#aaa" font-size="9" font-family="sans-serif" stroke="none">25</text>
