<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  functions/officeToPdf/fontconfig-thai.conf

  (2026-05-23 EOD+1 — V110 font-fidelity fix) Maps Microsoft-proprietary Thai
  fonts (Cordia New / Browallia New / Angsana New + their UPC variants) to
  the closest metric-equivalent free Thai fonts in fonts-thai-tlwg. Without
  this, when a docx specifies Cordia New (the Word default for Thai docs via
  the document theme), LibreOffice falls back to Noto Sans Thai — same
  shapes but DIFFERENT character widths → different line-wrap positions
  vs MS Word's actual Cordia rendering.

  Metric-similarity reference (Thai government + community-established):
    Cordia/CordiaUPC      → Loma     (sans, narrow, body-text weight)
    Browallia/BrowalliaUPC → Garuda  (sans, slightly wider)
    Angsana/AngsanaUPC    → Norasi   (serif, formal Thai)
    IrisUPC               → Loma     (sans light)
    JasmineUPC            → Norasi   (serif decorative)
    LilyUPC               → Garuda
    EucrosiaUPC           → Norasi
    FreesiaUPC            → Loma
    KodchiangUPC          → Loma
    DilleniaUPC           → Norasi

  binding="strong" forces this even if LibreOffice has its own table.
  Honest limit: 100% pixel-match impossible because (a) LibreOffice render
  engine ≠ Word's engine for Thai CTL, AND (b) free metric-equivalents are
  CLOSE but not identical to the proprietary originals. Expect ~85-95%
  visual similarity, occasional line-break shift.
-->
<fontconfig>
  <!-- Cordia family -->
  <alias binding="strong">
    <family>Cordia New</family>
    <accept><family>Loma</family></accept>
  </alias>
  <alias binding="strong">
    <family>CordiaUPC</family>
    <accept><family>Loma</family></accept>
  </alias>

  <!-- Browallia family -->
  <alias binding="strong">
    <family>Browallia New</family>
    <accept><family>Garuda</family></accept>
  </alias>
  <alias binding="strong">
    <family>BrowalliaUPC</family>
    <accept><family>Garuda</family></accept>
  </alias>

  <!-- Angsana family (serif Thai) -->
  <alias binding="strong">
    <family>Angsana New</family>
    <accept><family>Norasi</family></accept>
  </alias>
  <alias binding="strong">
    <family>AngsanaUPC</family>
    <accept><family>Norasi</family></accept>
  </alias>

  <!-- UPC variants commonly used in older Thai docs -->
  <alias binding="strong">
    <family>IrisUPC</family>
    <accept><family>Loma</family></accept>
  </alias>
  <alias binding="strong">
    <family>JasmineUPC</family>
    <accept><family>Norasi</family></accept>
  </alias>
  <alias binding="strong">
    <family>LilyUPC</family>
    <accept><family>Garuda</family></accept>
  </alias>
  <alias binding="strong">
    <family>EucrosiaUPC</family>
    <accept><family>Norasi</family></accept>
  </alias>
  <alias binding="strong">
    <family>FreesiaUPC</family>
    <accept><family>Loma</family></accept>
  </alias>
  <alias binding="strong">
    <family>KodchiangUPC</family>
    <accept><family>Loma</family></accept>
  </alias>
  <alias binding="strong">
    <family>DilleniaUPC</family>
    <accept><family>Norasi</family></accept>
  </alias>

  <!-- TH Sarabun PSK / TH Sarabun New — both ship in fonts-thai-tlwg, but
       different Word docs may use either name. Make them interchangeable. -->
  <alias binding="weak">
    <family>TH Sarabun New</family>
    <accept><family>TH Sarabun PSK</family></accept>
  </alias>

  <!-- Generic CTL fallback chain: when a doc requests any unknown Thai
       script font, prefer fonts-thai-tlwg families before Noto Sans Thai
       (Gotenberg base default). Loma is the most "neutral" Thai sans. -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Loma</family>
      <family>Garuda</family>
      <family>TH Sarabun PSK</family>
      <family>Noto Sans Thai</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Norasi</family>
      <family>Noto Serif Thai</family>
    </prefer>
  </alias>
</fontconfig>
