<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lover Clinic Broker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      width: 280px;
      min-height: 120px;
    }
    .header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #16a34a;
      box-shadow: 0 0 6px #16a34a;
    }
    .header-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
    }
    .header-sub {
      font-size: 9px;
      color: #555;
      margin-left: auto;
    }
    .body { padding: 12px 14px; }
    .empty {
      font-size: 11px;
      color: #555;
      text-align: center;
      padding: 20px 0;
    }
    .entry {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #1e1e1e;
      font-size: 11px;
    }
    .entry:last-child { border-bottom: none; }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-pending  { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
    .badge-done     { background: rgba(22,163,74,0.15);  color: #16a34a; border: 1px solid rgba(22,163,74,0.3); }
    .badge-failed   { background: rgba(220,38,38,0.15);  color: #ef4444; border: 1px solid rgba(220,38,38,0.3); }
    .session-id {
      font-family: monospace;
      font-size: 10px;
      color: #888;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .at { font-size: 9px; color: #555; white-space: nowrap; }
    .footer {
      padding: 8px 14px;
      border-top: 1px solid #1e1e1e;
      display: flex;
      justify-content: flex-end;
    }
    .btn-clear {
      font-size: 9px;
      background: none;
      border: 1px solid #333;
      color: #666;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .btn-clear:hover { border-color: #555; color: #aaa; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-dot" id="dot"></div>
    <span class="header-title">Lover Clinic → ProClinic</span>
    <span class="header-sub" id="count">0 รายการ</span>
  </div>
  <div class="body" id="list">
    <div class="empty" id="empty">ยังไม่มีการส่งข้อมูล</div>
  </div>
  <div class="footer" id="footer" style="display:none">
    <button class="btn-clear" id="clearBtn">ล้างประวัติ</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
